<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0F172A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>BRIA — Briefing Diário</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Cabeçalho fixo com nome e data -->
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="brand-logo">BRIA</span>
        <span class="brand-tagline">Briefing Diário</span>
      </div>
      <span class="header-date" id="headerDate">—</span>
    </div>
  </header>

  <!-- Abas de navegação por tema -->
  <nav class="tabbar">
    <button class="tab active" data-tema="IA & Tech">🤖 IA & Tech</button>
    <button class="tab" data-tema="Mercado Financeiro">💰 Mercado</button>
    <button class="tab" data-tema="Contabilidade & Legislação">📋 Fiscal</button>
  </nav>

  <!-- Área principal com três estados -->
  <main class="main">

    <!-- Estado: carregando -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Carregando briefing...</p>
    </div>

    <!-- Estado: erro de conexão -->
    <div class="erro hidden" id="erro">
      <span class="state-icon">⚠️</span>
      <p id="erroMsg">Não foi possível carregar o briefing.</p>
      <button class="btn-retry" onclick="carregarBriefing()">Tentar novamente</button>
    </div>

    <!-- Estado: sem notícias neste tema -->
    <div class="vazio hidden" id="vazio">
      <span class="state-icon">📭</span>
      <p>Nenhuma notícia para este tema hoje.</p>
    </div>

    <!-- Cards de notícias -->
    <div class="cards" id="cards"></div>

  </main>

  <script src="app.js"></script>
</body>
</html>
